name: Build and Deploy GitHub Pages

# Allow the workflow token to write the built artifacts and update Pages
permissions:
  contents: write
  pages: write

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        # Use `npm install` in CI to avoid failing when the lockfile and package.json
        # are out of sync (GitHub Actions runner may use a different npm version).
        run: npm install

      - name: Build production assets
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
