<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eko Akademie | Pěstování</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script type="module" crossorigin src="/didaktak-app/assets/index-BXAGwfCL.js"></script>
  <link rel="stylesheet" crossorigin href="/didaktak-app/assets/index-CbE6DHtC.css">
</head>

<body>
    <div class="modern-bg">
        <div class="bg-blob blob-1"></div>
        <div class="bg-blob blob-2"></div>
        <div class="bg-blob blob-3"></div>
    </div>

    <div class="main-wrapper">

        <div class="app-container">
            <header class="profile-hud eco-card">
                <div class="user-main">
                    <div class="lvl-star" id="hud-level">1</div>
                    <div class="user-stats">
                        <div class="rank-row">
                            <span class="rank" id="hud-rank">Učeň</span>
                            <span class="streak"><i class="fas fa-sun"></i> <span id="hud-streak">0</span> d</span>
                        </div>
                        <div class="xp-container">
                            <div class="xp-bar" id="hud-xp-fill"></div>
                        </div>
                        <span class="xp-val" id="hud-xp-text">0 / 1000 XP</span>
                    </div>
                </div>
                <div class="hud-actions">
                    <div class="score-badge" title="Lístky k útratě">
                        <i class="fas fa-leaf" style="color: var(--eco-green);"></i>
                        <span id="hud-coins" style="font-weight: 900; font-size: 1.2rem; margin-left: 5px;">0</span>
                    </div>
                    <button id="audio-toggle" class="active"><i class="fas fa-volume-up"></i></button>
                </div>
            </header>

            <main id="subject-screen" class="screen">
                <h1 class="eco-title">Sakura Study Garden</h1>
                <p class="subtitle">Zvolte si semínka pro dnešní pěstování</p>

                <div class="subject-grid">
                    <div class="seed-packet draggable" draggable="true" data-subject="Český jazyk">
                        <div class="packet-top"></div>
                        <i class="fas fa-book-open seed-icon"></i>
                        <span>ČEŠTINA</span>
                    </div>
                    <div class="seed-packet draggable" draggable="true" data-subject="Anglický jazyk">
                        <div class="packet-top"></div>
                        <i class="fas fa-globe-americas seed-icon"></i>
                        <span>ANGLIČTINA</span>
                    </div>
                </div>

                <div class="drop-zone smart-planter" id="main-drop-zone">
                    <i class="fas fa-tractor"></i>
                    <p>ZASADIT SEMÍNKA SEM</p>
                </div>

                <div class="eco-log eco-card">
                    <i class="fas fa-info-circle"></i> <span id="terminal-text">Chytrý záhon je připraven k
                        setbě...</span>
                </div>
            </main>

            <main id="menu-screen" class="screen" style="display: none;">
                <div class="menu-header">
                    <button class="back-btn modern-btn btn-outline" id="btn-back-to-subjects"><i
                            class="fas fa-chevron-left"></i> Zpět</button>
                    <h2 id="active-subject-name" class="eco-title" style="font-size: 1.8rem; margin: 0;">Předmět</h2>
                </div>
                <div class="tier-list" id="tier-list"></div>
            </main>

            <main id="quiz-screen" class="screen" style="display: none;">
                <div class="quiz-header eco-card"
                    style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px; padding: 12px 20px;">
                    <button class="back-btn modern-btn btn-outline" id="btn-back-from-quiz"
                        style="padding: 8px 14px; font-size: 0.85rem;">
                        <i class="fas fa-chevron-left"></i> Zpět
                    </button>
                    <div class="q-progress-info" style="flex-grow: 1;">
                        <span id="q-counter" style="font-size: 0.85rem; margin-bottom: 4px;">Otázka 1 / 10</span>
                        <div class="q-progress-bar" style="height: 4px;">
                            <div id="q-progress-fill"></div>
                        </div>
                    </div>
                </div>

                <div id="quiz-content" class="eco-card">
                    <div class="q-type" id="q-type">PRAVOPIS</div>
                    <div class="vychozi-text" id="vychozi-text"></div>
                    <h2 class="q-text" id="q-text">Zadání...</h2>
                    <div class="options-grid" id="options-grid"></div>

                    <div class="feedback-box" id="feedback-box"
                        style="display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-line);">
                        <h4 id="feedback-title" style="font-size: 0.9rem; margin-bottom: 4px;">LOG_ENTRY:</h4>
                        <p id="feedback-text" style="font-size: 0.9rem; margin-bottom: 12px; line-height: 1.4;"></p>
                        <button class="next-btn modern-btn btn-primary" id="btn-next"
                            style="width: 100%; padding: 10px 20px; font-size: 0.9rem;">
                            DALŠÍ OTÁZKA <i class='fas fa-arrow-right'></i>
                        </button>
                    </div>
                </div>
            </main>

            <main id="result-screen" class="screen" style="display: none;">
                <div class="result-card eco-card">
                    <div class="result-circle">
                        <span id="res-percent">0%</span>
                    </div>
                    <h2 id="res-msg">Sklizeň Dokončena</h2>
                    <p class="res-subtext" id="res-subtext">Shrnutí modulu</p>
                    <div class="res-stats">
                        <div class="res-stat" title="Získáno lístků k útratě">+<span id="res-xp">0</span> <i
                                class="fas fa-leaf"></i></div>
                    </div>
                    <button class="restart-btn modern-btn btn-primary" id="btn-finish-quiz"
                        style="width: 100%; margin-top: 20px;">HOTOVO</button>
                </div>
            </main>
        </div>

        <aside class="garden-container" id="garden-aside">
            <div class="eco-card purchase-panel">
                <h3 style="color: var(--text-dark); font-weight: 900; margin-bottom: 10px; font-size: 1.4rem;">Zahrada
                </h3>
                <p style="color: var(--text-muted); font-weight: 800; font-size: 0.95rem; margin-bottom: 20px;">
                    Cíl: <span id="next-upgrade-name" style="color: var(--eco-green-dark);">Stonek</span>
                </p>
                <button id="btn-buy-tulip" class="modern-btn btn-primary" style="width: 100%; font-size: 1.1rem;">
                    Koupit (20 <i class="fas fa-leaf"></i>)
                </button>
            </div>

            <div class="eco-card tulip-display">
                <svg viewBox="0 0 200 300" class="tulip-svg">
                    <g id="t-pot" class="t-part">
                        <path d="M60,280 L140,280 L155,180 L45,180 Z" fill="rgba(255,255,255,0.9)"
                            stroke="var(--border-light)" stroke-width="4" />
                        <rect x="35" y="180" width="130" height="24" rx="12" fill="var(--petal-pink)" />
                    </g>
                    <g id="t-stem" class="t-part" style="opacity: 0;">
                        <path d="M100,180 Q90,120 100,70" fill="none" stroke="var(--accent-mint)" stroke-width="10"
                            stroke-linecap="round" />
                    </g>
                    <g id="t-leaves" class="t-part" style="opacity: 0;">
                        <path d="M98,160 Q40,140 30,90 Q70,110 98,140" fill="var(--accent-mint)" />
                        <path d="M102,150 Q160,130 170,80 Q130,100 102,130" fill="var(--accent-mint)" />
                    </g>
                    <g id="t-bud" class="t-part" style="opacity: 0;">
                        <path d="M100,90 Q80,60 100,40 Q120,60 100,90" fill="var(--eco-green-light)" />
                    </g>
                    <g id="t-bloom" class="t-part" style="opacity: 0;">
                        <path d="M100,90 C40,90 40,10 100,30 C100,50 100,70 100,90 Z" fill="var(--eco-green-dark)" />
                        <path d="M100,90 C160,90 160,10 100,30 C100,50 100,70 100,90 Z" fill="var(--eco-green-dark)" />
                        <path d="M100,90 C60,50 80,0 100,10 C120,0 140,50 100,90 Z" fill="var(--eco-green)" />
                    </g>
                </svg>
            </div>
        </aside>

    </div>
</body>

</html>
